<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Reed Field</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #1c2252;
      overflow: hidden;
      overscroll-behavior: none;
    }
    #reed-hero {
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
    }
    #reed-hero canvas {
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="reed-hero"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script src="reed-field.js"></script>
  <script>
    ReedField.init('reed-hero', {
      reedCount: window.innerWidth < 768 ? 700 : 1000,
      influenceRadius: window.innerWidth < 768 ? 20 : 100,
      reedLengthMin: 23,
      reedLengthMax: 28,
      swayStrength: 0,
    });
  </script>
</body>
</html>
