<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Reed Field</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #1c2252;

    #reed-hero {
      width: 100vw;
      height: 100vh;
      display: block;

  </div>
  <div id="reed-hero"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script src="reed-field.js"></script>
  <script>
    ReedField.init('reed-hero', {
      reedCount: 2000,
      reedLengthMin: 5,
      reedLengthMax: 5,
      swayStrength: 0,
    });
